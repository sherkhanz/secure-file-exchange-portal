name: SFEP CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ============================================================================
  # JOB 1: Unit Tests
  # ============================================================================
  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest app/tests/test_main.py \
            --cov=app \
            --cov-report=term-missing \
            -v
        env:
          DB_PATH: /tmp/test_portal.db
          STORAGE_PATH: /tmp/test_files
          API_TOKEN: test-token-unit

  # ============================================================================
  # JOB 2: Integration Tests
  # ============================================================================
  integration-tests:
    name: Integration Tests (docker + curl)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build --no-cache

      - name: Start containers
        run: docker compose up -d

      - name: Wait for API health check
        run: |
          echo "Waiting for API to be ready..."
          for i in {1..20}; do
            if curl -s http://localhost:8000/health | grep -q "ok"; then
              echo "API is ready."
              break
            fi
            echo "Attempt $i/20 — waiting 3 seconds..."
            sleep 3
          done

      - name: Run integration tests
        run: |
          chmod +x automate_tests.sh
          ./automate_tests.sh
        env:
          BASE_URL: http://localhost:8000
          API_TOKEN: supersecret-mock-token

      - name: Print API logs on failure
        if: failure()
        run: docker compose logs api

      - name: Stop containers
        if: always()
        run: docker compose down -v
